apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: ca-issuer
  name: dozzle
  namespace: dozzle
spec:
  rules:
  - host: dozzle.home
    http:
      paths:
      - backend:
          service:
            name: dozzle-service
            port:
              number: 8080
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - jellyfin.home
    secretName: jellyfin-cert

apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: sure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/we-promise/sure:stable
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: sure-config
            - secretRef:
                name: sure-secrets
          volumeMounts:
            - mountPath: /rails/storage
              name: app-storage
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: app-storage
          persistentVolumeClaim:
            claimName: app-storage
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: sure
spec:
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000
